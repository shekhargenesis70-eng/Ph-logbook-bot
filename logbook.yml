name: 📋 PG Logbook Automation

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Mode'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview        # just print all 85 entries, no submission
          - submit         # actually fill the logbook

jobs:
  fill-logbook:
    runs-on: ubuntu-latest
    timeout-minutes: 90        # 85 entries × ~1 min each

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🌐 Install Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: 📦 Install Python dependencies
        run: pip install selenium webdriver-manager

      - name: 🤖 Run logbook bot
        env:
          LB_USER:  ${{ secrets.LB_USER }}
          LB_PASS:  ${{ secrets.LB_PASS }}
          DRY_RUN:  ${{ github.event.inputs.dry_run == 'preview' && 'true' || 'false' }}
        run: python logbook_bot.py

      - name: 📸 Upload all screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "screenshot_*.png"
          retention-days: 5

      - name: ❌ Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failures
          path: "*_FAILED.png"
          retention-days: 7
